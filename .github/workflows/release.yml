name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dof-x86_64-linux
          path: target/x86_64-unknown-linux-musl/release/dof

  build-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target aarch64-unknown-linux-musl
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dof-aarch64-linux
          path: target/aarch64-unknown-linux-musl/release/dof

  release:
    needs: [build-x86_64, build-aarch64]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare binaries
        run: |
          mv artifacts/dof-x86_64-linux/dof dof-x86_64-linux
          mv artifacts/dof-aarch64-linux/dof dof-aarch64-linux
          chmod +x dof-x86_64-linux dof-aarch64-linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dof-x86_64-linux
            dof-aarch64-linux
          generate_release_notes: true
          draft: false
          prerelease: false
